version = 1

# Default one-shot task file. AI agents should use this for temporary checks.
scratch_file = ".action-agent/scratch.py"
include_scratch = true

# Reusable task directory. AI agents should only create files here when reuse is likely.
task_dir = ".action-agent/tasks"

# Output directory for captured task logs.
output_dir = ".action-agent/output"

# Stable machine-readable result file. AI agents should read this after ActionAgent runs.
result_file = ".action-agent/result.json"

# Informational platform setting. The workflow currently uses ubuntu-latest.
platform = "ubuntu-latest"

# Python version used by the ActionAgent workflow setup step.
# AI agents may change this when a task requires a different Python version.
python_version = "3.12"

# Safety limits.
max_tasks = 8
default_timeout = 600

# Runtime state behavior.
reset_after_run = true
commit_reset = true
commit_result = true
commit_outputs = false
upload_artifact = true

[commands]
# Used only when a task does not define [commands].run.
default_run = []

[execution]
default_shell = "bash"
default_cwd = "."
default_reset_on = "always" # success / always / never
continue_on_error = false
fail_if_no_task = false
fail_workflow_on_task_failure = false

[output]
mode = "both"       # log / file / both / none
artifact = true
commit = false
excerpt_bytes = 20000
failed_excerpt_bytes = 100000

[comment]
# Human-readable result comments. Comments are a lightweight UI; full logs stay in artifacts.
# Use an issue number to force a specific issue, or "auto" to find/create a control issue.
enabled = true
issue = "auto"
auto_create_issue = true
auto_issue_title = "ActionAgent"
auto_issue_marker = "<!-- action-agent-issue:v1 -->"
auto_issue_body = "ActionAgent run results and summaries. If issue comments are unavailable, read .action-agent/result.json and workflow artifacts instead."
auto_issue_state = "open" # open / closed / all
auto_issue_labels = []
marker = "<!-- action-agent-result:v1 -->"
mode = "excerpt" # summary / excerpt / full
artifact_name = "action-agent-output"
max_comment_bytes = 10000
success_excerpt_bytes = 6000
failed_excerpt_bytes = 12000

[comment.cleanup]
enabled = true
max_count = 10
max_total_bytes = 60000
target_total_bytes = 55000
min_keep = 3
delete_only_marked = true
