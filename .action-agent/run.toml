version = 1

# Default one-shot task file. AI agents should use this for temporary checks.
scratch_file = ".action-agent/scratch.py"
include_scratch = true

# Reusable task directory. AI agents should only create files here when reuse is likely.
task_dir = ".action-agent/tasks"

# Output directory for captured task logs.
output_dir = ".action-agent/output"

# Informational platform setting. The workflow currently uses ubuntu-latest.
platform = "ubuntu-latest"

# Safety limits.
max_tasks = 8
default_timeout = 600

# Runtime state behavior.
reset_after_run = true
commit_reset = true
commit_outputs = false
upload_artifact = true

[commands]
# Used only when a task does not define [commands].run.
default_run = []

[execution]
default_shell = "bash"
default_cwd = "."
default_reset_on = "success" # success / always / never
continue_on_error = false
fail_if_no_task = false

[output]
mode = "both"       # log / file / both / none
artifact = true
commit = false
